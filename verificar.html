<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación Oficial | Bomberos Cubarral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; }
        .escudo-shadow { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-4">
    
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl border border-slate-200 p-8 text-center space-y-6">
        <div class="flex flex-col items-center">
            <img src="img/logobomberos.png" alt="Logo Bomberos" class="w-24 h-24 mb-4 escudo-shadow">
            <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">Bomberos Cubarral</h1>
            <p class="text-xs text-red-600 font-bold tracking-widest uppercase">Certificación de Seguridad</p>
        </div>
        
        <div id="estado-carga" class="text-slate-400 text-sm py-8 space-y-2">
            <i class="fa-solid fa-shield-halved animate-pulse text-4xl text-slate-300"></i>
            <p>Verificando autenticidad en servidor seguro...</p>
        </div>

        <div id="resultado-validacion" class="hidden text-left"></div>
        
        <div class="border-t border-slate-100 pt-6">
            <a href="index.html" class="text-[11px] text-slate-400 hover:text-red-600 uppercase font-bold tracking-widest transition">
                <i class="fa-solid fa-lock mr-1"></i> Entorno de Verificación Segura
            </a>
        </div>
    </div>

    <script type="module">
        import { db } from "./js/firebase-config.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const estadoCarga = document.getElementById("estado-carga");
        const resultadoValidacion = document.getElementById("resultado-validacion");

        async function validarQR() {
            // 1. Capturar el NIT directamente de la barra de direcciones de la web
            const urlParams = new URLSearchParams(window.location.search);
            const nit = urlParams.get('nit');

            // Si alguien entra a verificar.html sin escanear un QR (sin NIT en la URL)
            if (!nit) {
                mostrarError("Lectura Inválida", "Este código QR no contiene información de rastreo.", "fa-qrcode");
                return;
            }

            try {
                // 2. Buscar el documento en la base de datos
                const docRef = doc(db, "certificados", nit);
                const docSnap = await getDoc(docRef);

                estadoCarga.classList.add("hidden");
                resultadoValidacion.classList.remove("hidden");

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // 3. Comprobar Vigencia (Corregido para zona horaria local)
                    const hoy = new Date();
                    const año = hoy.getFullYear();
                    const mes = String(hoy.getMonth() + 1).padStart(2, '0');
                    const dia = String(hoy.getDate()).padStart(2, '0');
                    const fechaHoy = `${año}-${mes}-${dia}`; // Formato: YYYY-MM-DD

                    // Comparamos directamente los strings (ej. "2026-12-31" >= "2026-06-25")
                    const esVigente = data.vencimiento >= fechaHoy;

                    if (esVigente) {
                        resultadoValidacion.innerHTML = `
                            <div class="border-2 border-green-500 bg-green-50 rounded-xl p-5 text-center space-y-3">
                                <div class="text-green-600 text-5xl drop-shadow-sm"><i class="fa-solid fa-circle-check"></i></div>
                                <h3 class="text-lg font-black text-green-900 uppercase tracking-wide">Certificado Vigente</h3>
                                <div class="text-sm text-slate-800 text-left space-y-1 bg-white p-4 rounded-lg border border-green-200 shadow-sm">
                                    <p class="truncate"><strong>Establecimiento:</strong><br>${data.nombre}</p>
                                    <p><strong>NIT / ID:</strong><br>${nit}</p>
                                    <p><strong>Vencimiento:</strong><br>${data.vencimiento}</p>
                                </div>
                                <p class="text-[10px] text-green-700 font-medium">Validación oficial en tiempo real</p>
                            </div>
                        `;
                    } else {
                        resultadoValidacion.innerHTML = `
                            <div class="border-2 border-amber-500 bg-amber-50 rounded-xl p-5 text-center space-y-3">
                                <div class="text-amber-500 text-5xl drop-shadow-sm"><i class="fa-solid fa-triangle-exclamation"></i></div>
                                <h3 class="text-lg font-black text-amber-900 uppercase tracking-wide">Certificado Vencido</h3>
                                <p class="text-sm text-amber-800">El documento expiró oficialmente el <strong>${data.vencimiento}</strong> y no es válido actualmente.</p>
                            </div>
                        `;
                    }
                } else {
                    mostrarError("Establecimiento No Registrado", `El documento con NIT ${nit} no existe o fue revocado en la base de datos oficial.`, "fa-folder-open");
                }
            } catch (error) {
                console.error(error);
                mostrarError("Error de Conexión", "No se pudo contactar con el servidor. Intente escanear nuevamente.", "fa-wifi");
            }
        }

        function mostrarError(titulo, mensaje, icono) {
            estadoCarga.classList.add("hidden");
            resultadoValidacion.classList.remove("hidden");
            resultadoValidacion.innerHTML = `
                <div class="border-2 border-red-200 bg-red-50 rounded-xl p-5 text-center space-y-3">
                    <div class="text-red-500 text-5xl drop-shadow-sm"><i class="fa-solid ${icono}"></i></div>
                    <h3 class="text-lg font-black text-slate-900 uppercase tracking-wide">${titulo}</h3>
                    <p class="text-sm text-slate-600">${mensaje}</p>
                </div>
            `;
        }

        // Ejecutar la validación tan pronto como cargue la página
        document.addEventListener("DOMContentLoaded", validarQR);
    </script>
</body>
</html>
