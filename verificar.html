<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación Oficial | Bomberos Cubarral</title>
    <link rel="icon" type="image/png" href="img/logobomberos.webp">
    
    <!-- Tipografía -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; 
            /* Patrón de puntos para aspecto tecnológico/seguro */
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .escudo-shadow { filter: drop-shadow(0 8px 12px rgba(220, 38, 38, 0.15)); }
        
        /* Animación suave al cargar resultados */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeInUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-4">
    
    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl border border-slate-100 p-8 text-center space-y-6 relative overflow-hidden">
        
        <!-- Franja de color de la parte superior -->
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-red-700 via-red-500 to-amber-500"></div>

        <div class="flex flex-col items-center pt-2">
            <a href="index.html" class="transition-transform hover:scale-105 focus:outline-none">
                <img src="img/logobomberos.webp" alt="Logo Bomberos" class="w-24 h-24 mb-4 escudo-shadow mx-auto cursor-pointer">
            </a>
            <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tight">Bomberos Cubarral</h1>
            <p class="text-[10px] text-red-600 font-bold tracking-[0.2em] uppercase mt-1">Portal de Verificación Segura</p>
        </div>
        
        <div id="estado-carga" class="text-slate-400 text-sm py-8 space-y-3">
            <i class="fa-solid fa-shield-halved animate-pulse text-4xl text-slate-200"></i>
            <p class="animate-pulse">Consultando base de datos oficial...</p>
        </div>

        <div id="resultado-validacion" class="hidden text-left animate-fade"></div>
        
        <div class="border-t border-slate-100 pt-6 flex flex-col items-center gap-3">
            <p class="text-[9px] text-slate-400 uppercase font-semibold text-center leading-relaxed max-w-[250px]">
                El uso indebido de credenciales constituye un delito según la ley colombiana.
            </p>
            <a href="index.html" class="inline-flex items-center text-[12px] text-slate-500 hover:text-red-600 uppercase font-bold tracking-widest transition group">
                <i class="fa-solid fa-house mr-2 group-hover:-translate-x-1 transition-transform"></i> Página Principal
            </a>
        </div>
    </div>

    <script type="module">
        import { db } from "./js/firebase-config.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const estadoCarga = document.getElementById("estado-carga");
        const resultadoValidacion = document.getElementById("resultado-validacion");

        async function validarQR() {
            const urlParams = new URLSearchParams(window.location.search);
            const nit = urlParams.get('nit');

            if (!nit) {
                mostrarError("Lectura Inválida", "Este código QR no contiene información de rastreo oficial.", "fa-qrcode");
                return;
            }

            try {
                const docRef = doc(db, "certificados", nit);
                const docSnap = await getDoc(docRef);

                estadoCarga.classList.add("hidden");
                resultadoValidacion.classList.remove("hidden");

                // Capturamos fecha y hora exacta de la consulta
                const fechaConsulta = new Date().toLocaleString('es-CO', { 
                    year: 'numeric', month: '2-digit', day: '2-digit', 
                    hour: '2-digit', minute: '2-digit', second: '2-digit' 
                });

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    const hoy = new Date();
                    const año = hoy.getFullYear();
                    const mes = String(hoy.getMonth() + 1).padStart(2, '0');
                    const dia = String(hoy.getDate()).padStart(2, '0');
                    const fechaHoy = `${año}-${mes}-${dia}`; 

                    const esVigente = data.vencimiento >= fechaHoy;

                    if (esVigente) {
                        resultadoValidacion.innerHTML = `
    <div class="border border-emerald-200 bg-white rounded-2xl overflow-hidden shadow-lg shadow-emerald-500/10">
        <div class="bg-emerald-500 p-4 text-center relative overflow-hidden">
            <div class="absolute -right-4 -top-4 opacity-20"><i class="fa-solid fa-certificate text-6xl text-white"></i></div>
            <div class="relative z-10 text-white flex flex-col items-center">
                <i class="fa-solid fa-circle-check text-4xl mb-2 drop-shadow-md"></i>
                <h3 class="text-sm font-black uppercase tracking-widest">Certificado Vigente</h3>
            </div>
        </div>
        <div class="p-5 space-y-3">
            
            <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Razón Social / Establecimiento</p>
                <p class="text-sm font-black text-slate-800 leading-tight">${data.nombre}</p>
            </div>

            <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 space-y-2">
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5"><i class="fa-solid fa-location-dot mr-1 text-slate-300"></i> Dirección Comercial</p>
                    <p class="text-xs font-bold text-slate-700 leading-tight">${data.direccion || 'No registrada'}</p>
                </div>
                <div class="border-t border-slate-200 pt-2">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5"><i class="fa-solid fa-user-tie mr-1 text-slate-300"></i> Representante Legal</p>
                    <p class="text-xs font-bold text-slate-700">${data.representante || 'No registrado'}</p>
                </div>
            </div>

            <div class="flex gap-3">
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 flex-1">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">NIT / ID</p>
                    <p class="text-xs font-bold text-slate-700 font-mono">${nit}</p>
                </div>
                <div class="bg-emerald-50 p-3 rounded-xl border border-emerald-100 flex-1">
                    <p class="text-[10px] text-emerald-600 font-bold uppercase tracking-wider mb-1">Vence en</p>
                    <p class="text-xs font-black text-emerald-700">${data.vencimiento}</p>
                </div>
            </div>
        </div>
        <div class="bg-slate-50 px-4 py-2 border-t border-slate-100 flex justify-between items-center text-[9px] text-slate-400 font-mono">
            <span><i class="fa-solid fa-clock mr-1"></i> ${fechaConsulta}</span>
            <span>V-1.1</span>
        </div>
    </div>
`;
                    } else {
                        resultadoValidacion.innerHTML = `
                            <div class="border border-amber-200 bg-white rounded-2xl overflow-hidden shadow-lg shadow-amber-500/10">
                                <div class="bg-amber-500 p-4 text-center text-white">
                                    <i class="fa-solid fa-triangle-exclamation text-4xl mb-2 drop-shadow-md"></i>
                                    <h3 class="text-sm font-black uppercase tracking-widest">Certificado Vencido</h3>
                                </div>
                                <div class="p-5 text-center space-y-3">
                                    <p class="text-sm text-slate-600">El establecimiento <strong>${data.nombre}</strong> (NIT: ${nit}) no cuenta con autorización operativa actual.</p>
                                    <div class="inline-block bg-amber-50 border border-amber-200 text-amber-800 text-xs font-bold px-3 py-1.5 rounded-lg">
                                        Expiró el: ${data.vencimiento}
                                    </div>
                                </div>
                                <div class="bg-slate-50 px-4 py-2 border-t border-slate-100 text-center text-[9px] text-slate-400 font-mono">
                                    Consulta: ${fechaConsulta}
                                </div>
                            </div>
                        `;
                    }
                } else {
                    mostrarError("No Registrado", `El NIT ${nit} no figura en la base de datos oficial. Si cree que es un error, contacte a la estación.`, "fa-file-circle-xmark");
                }
            } catch (error) {
                console.error(error);
                mostrarError("Error de Conexión", "Fallo temporal al conectar con el servidor central.", "fa-wifi");
            }
        }

        function mostrarError(titulo, mensaje, icono) {
            estadoCarga.classList.add("hidden");
            resultadoValidacion.classList.remove("hidden");
            
            const fechaConsulta = new Date().toLocaleString('es-CO');
            
            resultadoValidacion.innerHTML = `
                <div class="border border-red-200 bg-white rounded-2xl overflow-hidden shadow-lg shadow-red-500/10">
                    <div class="bg-red-50 p-6 text-center">
                        <div class="w-16 h-16 bg-white border border-red-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm text-red-500 text-3xl">
                            <i class="fa-solid ${icono}"></i>
                        </div>
                        <h3 class="text-base font-black text-red-900 uppercase tracking-widest mb-2">${titulo}</h3>
                        <p class="text-xs text-red-700/80 leading-relaxed">${mensaje}</p>
                    </div>
                    <div class="bg-slate-50 px-4 py-2 border-t border-slate-100 text-center text-[9px] text-slate-400 font-mono">
                        Intento de consulta: ${fechaConsulta}
                    </div>
                </div>
            `;
        }

        document.addEventListener("DOMContentLoaded", validarQR);
    </script>
</body>
</html>
